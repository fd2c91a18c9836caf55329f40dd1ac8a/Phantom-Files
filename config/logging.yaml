version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: "%(asctime)s %(name)s [%(levelname)s] %(message)s"
  ecs_json:
    "()": phantom.logging.ecs.ECSFormatter

handlers:
  console:
    class: logging.StreamHandler
    formatter: simple
    level: INFO
  audit_file:
    class: logging.handlers.RotatingFileHandler
    formatter: ecs_json
    filename: /tmp/phantom_logs/audit.jsonl
    maxBytes: 10485760
    backupCount: 10
    level: INFO

loggers:
  phantom:
    handlers: [console, audit_file]
    level: INFO
    propagate: false

root:
  handlers: [console]
  level: INFO

