[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --strict-config
xfail_strict = true
norecursedirs = .venv .git output data .pytest_cache
markers =
    unit: fast, isolated unit tests
    integration: tests that touch filesystem, network, subprocess, or multiple modules
    slow: long-running or environment-heavy tests (subset of integration)
filterwarnings =
    error::DeprecationWarning:phantom\..*
    error::PendingDeprecationWarning:phantom\..*
