name: phantom-daemon
arch: amd64
platform: linux
version: 1.0.0
description: |
  Phantom Files Daemon — Active Defense Deception daemon for Linux.
  Deploys honeytokens, monitors via fanotify/eBPF, responds to unauthorized access.
vendor: Phantom Project
homepage: https://github.com/fd2c91a18c9836caf55329f40dd1ac8a/Phantom-Files
license: Apache-2.0

depends:
  - python3 (>= 3.10)
  - python3-pip
  - nftables

recommends:
  - clang
  - bpftool
  - docker.io

contents:
  # Исходный код
  - src: src/phantom
    dst: /opt/phantom/src/phantom/
    type: tree

  # Конфигурация
  - src: config/phantom.yaml
    dst: /etc/phantom/phantom.yaml
    type: config
    file_info:
      mode: 0640
      owner: root
      group: phantom-user

  - src: config/policies.yaml
    dst: /etc/phantom/policies.yaml
    type: config
    file_info:
      mode: 0640
      owner: root
      group: phantom-user

  - src: config/traps_manifest.yaml
    dst: /etc/phantom/traps_manifest.yaml
    type: config
    file_info:
      mode: 0640
      owner: root
      group: phantom-user

  - src: config/logging.yaml
    dst: /etc/phantom/logging.yaml
    type: config
    file_info:
      mode: 0640
      owner: root
      group: phantom-user

  # Шаблоны
  - src: resources/templates
    dst: /opt/phantom/resources/templates/
    type: tree

  # Systemd unit
  - src: deploy/phantom.service
    dst: /lib/systemd/system/phantom.service

  # Logrotate
  - src: deploy/phantom.logrotate
    dst: /etc/logrotate.d/phantom

  # Пустые директории
  - dst: /var/lib/phantom
    type: dir
    file_info:
      mode: 0750
      owner: phantom
      group: phantom-user

  - dst: /var/lib/phantom/evidence
    type: dir
    file_info:
      mode: 0700
      owner: phantom
      group: phantom-user

  - dst: /var/log/phantom
    type: dir
    file_info:
      mode: 0750
      owner: phantom
      group: phantom-user

  - dst: /etc/phantom
    type: dir
    file_info:
      mode: 0750
      owner: root
      group: phantom-user

  - dst: /etc/phantom/keys
    type: dir
    file_info:
      mode: 0750
      owner: root
      group: phantom-user

  - dst: /etc/phantom/templates
    type: dir
    file_info:
      mode: 0750
      owner: root
      group: phantom-user

scripts:
  preinstall: deploy/scripts/preinstall.sh
  postinstall: deploy/scripts/postinstall.sh
  preremove: deploy/scripts/preremove.sh
